# ═══════════════════════════════════════════════════════════════════
#  Porto Real Estate Scraper - Configuration
# ═══════════════════════════════════════════════════════════════════
#  Edit this file freely. Changes take effect on the next startup, no recompiling needed.
#
#  Place this file in the same folder as the JAR.
# ═══════════════════════════════════════════════════════════════════

# -- Scheduler --------------------------------------------------------
# How often to scrape, in minutes.
# Lower = faster alerts but higher chance of being rate-limited.
poll.interval.minutes=5

# -- Discord ----------------------------------------------------------
# Your Discord webhook URL. Leave blank to disable notifications.
# How to get one: Discord -> channel settings -> Integrations -> Webhooks
discord.webhook.url=

# -- Search Targets ---------------------------------------------------
# Define as many targets as you want using the pattern below.
# They are numbered from 1 upward. Gaps in numbering are fine.
#
# Required fields per target:
#   target.N.transaction  = BUY or RENT
#   target.N.property     = HOUSE, APARTMENT, or LAND
#   target.N.zone         = see zone list below
#
# Optional filters:
#   target.N.minPrice     = minimum price in €
#   target.N.maxPrice     = maximum price in €
#   target.N.minRooms     = minimum bedrooms (1=T1, 2=T2, ...)
#   target.N.maxRooms     = maximum bedrooms
#   target.N.minArea      = minimum area in m²
#   target.N.maxArea      = maximum area in m²
#
# Available zones:
#   PORTO, MATOSINHOS, GAIA, MAIA, GONDOMAR, VALONGO,
#   POVOA_DE_VARZIM, VILA_DO_CONDE, BRAGA, BARCELOS
# ---------------------------------------------------------------------

# Buy a house in Porto, up to €350k
target.1.transaction=BUY
target.1.property=HOUSE
target.1.zone=PORTO
target.1.maxPrice=350000

# Buy an apartment in Matosinhos, up to €280k
target.2.transaction=BUY
target.2.property=APARTMENT
target.2.zone=MATOSINHOS
target.2.maxPrice=280000

# Buy a house in Vila Nova de Gaia, up to €320k
target.3.transaction=BUY
target.3.property=HOUSE
target.3.zone=GAIA
target.3.maxPrice=320000

# Buy a house in Maia, up to €280k
target.4.transaction=BUY
target.4.property=HOUSE
target.4.zone=MAIA
target.4.maxPrice=280000

# Rent an apartment in Porto, €600-€1200/month
target.5.transaction=RENT
target.5.property=APARTMENT
target.5.zone=PORTO
target.5.minPrice=600
target.5.maxPrice=1200

# Rent an apartment in Matosinhos, up to €1100/month
target.6.transaction=RENT
target.6.property=APARTMENT
target.6.zone=MATOSINHOS
target.6.maxPrice=1100

# -- Example: uncomment to add more -----------------------------------
