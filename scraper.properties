# ═══════════════════════════════════════════════════════════════════
#  Porto Real Estate Scraper - Configuration
# ═══════════════════════════════════════════════════════════════════
#  Edit this file freely. Restart the scraper to apply changes.
#  Place next to the JAR file.
# ═══════════════════════════════════════════════════════════════════


# -- Scheduler --------------------------------------------------------
poll.interval.minutes=5


# -- Discord ----------------------------------------------------------
# Leave blank to disable
discord.webhook.url=


# -- Search Targets ---------------------------------------------------
# Required per target:
#   target.N.transaction  = BUY or RENT
#   target.N.property     = HOUSE, APARTMENT, or LAND
#   target.N.zone         = PORTO, MATOSINHOS, GAIA, MAIA, GONDOMAR,
#                           VALONGO, POVOA_DE_VARZIM, VILA_DO_CONDE,
#                           BRAGA, BARCELOS
#
# Optional:
#   target.N.source       = IMOVIRTUAL (default) or IDEALISTA
#   target.N.minPrice     = minimum price in €
#   target.N.maxPrice     = maximum price in €
#   target.N.minRooms     = minimum bedrooms
#   target.N.maxRooms     = maximum bedrooms
#   target.N.minArea      = minimum m²
#   target.N.maxArea      = maximum m²
# ---------------------------------------------------------------------


# -- Imovirtual targets ------------------------------------------------

target.1.source=IMOVIRTUAL
target.1.transaction=BUY
target.1.property=HOUSE
target.1.zone=PORTO
target.1.maxPrice=350000

